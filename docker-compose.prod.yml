# Despliegue de producción en la VM de OCI (Always Free).
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
# Requiere un archivo .env en la misma carpeta (no se commitea, ver docs/DEPLOY_OCI.md).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tikara-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tikara-queue
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "queue:work", "--tries=1", "--sleep=3"]
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx_runtime
    container_name: tikara-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: tikara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tikara}
      POSTGRES_USER: ${DB_USERNAME:-tikara}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tikara} -d ${DB_DATABASE:-tikara}"]
      interval: 5s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot
    container_name: tikara-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; done'"

volumes:
  postgres_data:
  storage_data:
  certbot_www:
  certbot_conf:
