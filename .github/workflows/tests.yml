name: Tests

on:
  push:
    branches:
      - main
      - Experimental
  pull_request:
    branches:
      - main
      - Experimental

jobs:
  sqlite:
    name: PHPUnit (SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend and build assets
        run: |
          npm ci
          npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force
          php artisan tenant:client-id verify --strict

      - name: Run tests
        run: composer test

  pgsql-rls:
    name: PHPUnit (PostgreSQL + RLS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ekindesk_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ekindesk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: ekindesk_test
      DB_USERNAME: ekindesk_app
      DB_PASSWORD: secret
      TENANCY_PGSQL_RLS: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pgsql
          coverage: none

      - name: Prepare PostgreSQL application role (non-superuser)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'ekindesk_app') THEN
              CREATE USER ekindesk_app WITH PASSWORD 'secret' NOSUPERUSER INHERIT;
            END IF;
          END
          $$;
          ALTER DATABASE ekindesk_test OWNER TO ekindesk_app;
          \c ekindesk_test
          ALTER SCHEMA public OWNER TO ekindesk_app;
          SQL

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend and build assets
        run: |
          npm ci
          npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan tenant:client-id verify --strict

      - name: Run tests (PostgreSQL + TENANCY_PGSQL_RLS)
        run: composer test:pgsql
